<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#7700A1"/>
      <stop offset="55%" stop-color="#2C0050"/>
      <stop offset="100%" stop-color="#0A0014"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2D77" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF2D77" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="0" flood-color="#1A0033"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#FFEE00" flood-opacity="0.7"/>
    </filter>
    <filter id="pinkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#FF2D77" flood-opacity="0.85"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="512" cy="600" rx="520" ry="240" fill="url(#glowPink)"/>

  <!-- Marquee border bulbs -->
  <g fill="#FFEE00">
    <!-- top row -->
    <g>
      <circle cx="56"  cy="56" r="14"/><circle cx="112" cy="56" r="14"/><circle cx="168" cy="56" r="14"/>
      <circle cx="224" cy="56" r="14"/><circle cx="280" cy="56" r="14"/><circle cx="336" cy="56" r="14"/>
      <circle cx="392" cy="56" r="14"/><circle cx="448" cy="56" r="14"/><circle cx="504" cy="56" r="14"/>
      <circle cx="560" cy="56" r="14"/><circle cx="616" cy="56" r="14"/><circle cx="672" cy="56" r="14"/>
      <circle cx="728" cy="56" r="14"/><circle cx="784" cy="56" r="14"/><circle cx="840" cy="56" r="14"/>
      <circle cx="896" cy="56" r="14"/><circle cx="952" cy="56" r="14"/>
    </g>
    <!-- bottom row -->
    <g>
      <circle cx="56"  cy="968" r="14"/><circle cx="112" cy="968" r="14"/><circle cx="168" cy="968" r="14"/>
      <circle cx="224" cy="968" r="14"/><circle cx="280" cy="968" r="14"/><circle cx="336" cy="968" r="14"/>
      <circle cx="392" cy="968" r="14"/><circle cx="448" cy="968" r="14"/><circle cx="504" cy="968" r="14"/>
      <circle cx="560" cy="968" r="14"/><circle cx="616" cy="968" r="14"/><circle cx="672" cy="968" r="14"/>
      <circle cx="728" cy="968" r="14"/><circle cx="784" cy="968" r="14"/><circle cx="840" cy="968" r="14"/>
      <circle cx="896" cy="968" r="14"/><circle cx="952" cy="968" r="14"/>
    </g>
    <!-- left column -->
    <g>
      <circle cx="56" cy="112" r="14"/><circle cx="56" cy="168" r="14"/><circle cx="56" cy="224" r="14"/>
      <circle cx="56" cy="280" r="14"/><circle cx="56" cy="336" r="14"/><circle cx="56" cy="392" r="14"/>
      <circle cx="56" cy="448" r="14"/><circle cx="56" cy="504" r="14"/><circle cx="56" cy="560" r="14"/>
      <circle cx="56" cy="616" r="14"/><circle cx="56" cy="672" r="14"/><circle cx="56" cy="728" r="14"/>
      <circle cx="56" cy="784" r="14"/><circle cx="56" cy="840" r="14"/><circle cx="56" cy="896" r="14"/>
    </g>
    <!-- right column -->
    <g>
      <circle cx="968" cy="112" r="14"/><circle cx="968" cy="168" r="14"/><circle cx="968" cy="224" r="14"/>
      <circle cx="968" cy="280" r="14"/><circle cx="968" cy="336" r="14"/><circle cx="968" cy="392" r="14"/>
      <circle cx="968" cy="448" r="14"/><circle cx="968" cy="504" r="14"/><circle cx="968" cy="560" r="14"/>
      <circle cx="968" cy="616" r="14"/><circle cx="968" cy="672" r="14"/><circle cx="968" cy="728" r="14"/>
      <circle cx="968" cy="784" r="14"/><circle cx="968" cy="840" r="14"/><circle cx="968" cy="896" r="14"/>
    </g>
  </g>

  <!-- Bulb glow halos (semi-transparent yellow) -->
  <g fill="#FFEE00" fill-opacity="0.18">
    <circle cx="56"  cy="56"  r="32"/><circle cx="968" cy="56"  r="32"/>
    <circle cx="56"  cy="968" r="32"/><circle cx="968" cy="968" r="32"/>
  </g>

  <!-- Big title -->
  <g font-family="Impact, 'Arial Black', sans-serif" font-weight="900" text-anchor="middle">
    <text x="512" y="430"
          font-size="200" fill="#FFEE00" filter="url(#shadow)"
          letter-spacing="2">TRASH</text>
    <text x="512" y="540"
          font-size="110" fill="#FFF8E7" font-style="italic"
          letter-spacing="6" filter="url(#pinkGlow)">or</text>
    <text x="512" y="700"
          font-size="170" fill="#00FF66" filter="url(#shadow)"
          letter-spacing="2">TREASURE</text>
  </g>

  <!-- Subtitle ribbon -->
  <g>
    <rect x="172" y="780" width="680" height="74" fill="#FF2D77" rx="6"/>
    <rect x="172" y="780" width="680" height="74" fill="none" stroke="#FFEE00" stroke-width="4" rx="6"/>
    <text x="512" y="828" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif" font-weight="900"
          font-size="46" fill="#FFF8E7" letter-spacing="4">SHOULD IT STAY OR GO?</text>
  </g>

  <!-- Sparkle stars -->
  <g fill="#FFEE00">
    <polygon points="200,310 215,355 260,360 224,387 240,432 200,405 160,432 176,387 140,360 185,355"/>
    <polygon points="824,310 836,348 875,352 845,374 858,412 824,389 790,412 803,374 773,352 812,348" transform="scale(1) translate(0,0)"/>
  </g>
</svg>
